<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>紊流番剧</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--bg2:#0c0c1a;--bg3:#101026;--card:#141430;--card2:#1a1a3a;
  --accent:#e63946;--accent2:#ff6b6b;--accent-g:rgba(230,57,70,.15);
  --text:#eaeaf5;--muted:#666688;--muted2:#8888aa;--border:#1e1e3e;
  --r:14px;--rs:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC','Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a50;border-radius:3px}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ========== NAV ========== */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;padding:0 28px;gap:16px;transition:all .3s}
.nav.scrolled{background:rgba(6,6,14,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav .logo{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),#ff8fa3,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;white-space:nowrap}
.nav .links{display:flex;gap:2px}
.nav .link{padding:7px 16px;border-radius:8px;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s}
.nav .link:hover,.nav .link.on{color:#fff;background:rgba(255,255,255,.05)}
.nav .link.on{background:var(--accent)}
.nav .search{flex:1;max-width:340px;margin-left:auto;position:relative}
.nav .search input{width:100%;padding:9px 36px 9px 14px;border:1px solid var(--border);border-radius:var(--r);background:rgba(255,255,255,.03);color:var(--text);font-size:.82rem;outline:none;transition:border .3s}
.nav .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g)}
.nav .search .ic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem}

/* ========== PAGES ========== */
.page{display:none}
.page.active{display:block}

/* ========== HOME ========== */
.hero{position:relative;overflow:hidden;margin-bottom:32px}
.hero-bg{width:100%;height:420px;background:linear-gradient(135deg,#120618 0%,#080818 50%,#061018 100%);position:relative}
.hero-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(transparent,var(--bg))}
.hero-inner{position:absolute;inset:0;display:flex;align-items:flex-end;max-width:1200px;margin:0 auto;padding:0 28px 36px;gap:24px}
.hero-poster{width:160px;height:230px;border-radius:var(--r);overflow:hidden;flex-shrink:0;box-shadow:0 12px 48px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.06)}
.hero-poster img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1;max-width:500px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:var(--accent);color:#fff;border-radius:16px;font-size:.68rem;font-weight:700;margin-bottom:10px}
.hero-title{font-size:2rem;font-weight:900;line-height:1.15;margin-bottom:6px}
.hero-meta{color:var(--muted);font-size:.78rem;margin-bottom:10px}
.hero-desc{color:#888;font-size:.82rem;line-height:1.65;max-width:460px;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border:none;border-radius:var(--r);font-size:.84rem;font-weight:700;transition:all .25s}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--accent-g)}
.btn-accent:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--accent-g)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}

.container{max-width:1200px;margin:0 auto;padding:0 28px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:1.1rem;font-weight:800}
.sec-count{font-size:.75rem;color:var(--muted)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:40px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .3s;border:1px solid transparent;position:relative}
.card:hover{transform:translateY(-8px);box-shadow:0 16px 40px rgba(0,0,0,.5);border-color:rgba(230,57,70,.4);z-index:5}
.card .thumb{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--card2)}
.card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .thumb img{transform:scale(1.06)}
.card .thumb .grad{position:absolute;inset:0;background:linear-gradient(transparent 55%,rgba(0,0,0,.65));opacity:0;transition:opacity .3s}
.card:hover .thumb .grad{opacity:1}
.card .thumb .play-btn{position:absolute;bottom:10px;right:10px;width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.7);transition:all .3s}
.card:hover .thumb .play-btn{opacity:1;transform:scale(1)}
.card .thumb .play-btn::after{content:'';border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:2px}
.card .thumb .ep-tag{position:absolute;top:7px;right:7px;padding:2px 7px;background:rgba(0,0,0,.55);color:#bbb;border-radius:6px;font-size:.6rem;font-weight:600;backdrop-filter:blur(4px)}
.card .meta{padding:9px 10px}
.card .meta .t{font-size:.78rem;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card .meta .s{font-size:.66rem;color:var(--muted);margin-top:3px}

/* Scroll row */
.row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory;scrollbar-width:none;margin-bottom:32px}
.row::-webkit-scrollbar{display:none}
.row .card{min-width:150px;max-width:150px;scroll-snap-align:start}

/* Loading */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading,.empty{text-align:center;padding:50px;color:var(--muted);font-size:.85rem}

/* ========== DETAIL PAGE ========== */
.detail-wrap{display:flex;gap:0;min-height:calc(100vh - 56px);margin-top:56px}

/* Left: player area */
.detail-left{flex:1;min-width:0;display:flex;flex-direction:column}
.player-container{position:relative;width:100%;background:#000}
.player-container .ratio{padding-top:56.25%;position:relative}
.player-container iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a18,#10102a);color:var(--muted);gap:10px}
.player-placeholder .big-icon{font-size:3rem;opacity:.4}
.player-placeholder p{font-size:.85rem}

/* Player info bar */
.player-info{padding:18px 24px;border-bottom:1px solid var(--border)}
.player-info .title{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.player-info .sub{font-size:.78rem;color:var(--muted)}
.player-info .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.player-info .tag{padding:3px 10px;background:rgba(230,57,70,.08);color:var(--accent2);border-radius:14px;font-size:.7rem;font-weight:600;border:1px solid rgba(230,57,70,.1)}

/* Description */
.detail-desc{padding:16px 24px;border-bottom:1px solid var(--border)}
.detail-desc h4{font-size:.85rem;font-weight:700;margin-bottom:8px}
.detail-desc p{color:#888;font-size:.8rem;line-height:1.7}

/* Similar */
.detail-similar{padding:18px 24px}
.detail-similar h4{font-size:.85rem;font-weight:700;margin-bottom:12px}
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.similar-card{background:var(--card);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:all .25s}
.similar-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.similar-card .st{aspect-ratio:3/4;overflow:hidden;background:var(--card2)}
.similar-card .st img{width:100%;height:100%;object-fit:cover}
.similar-card .sm{padding:6px 8px}
.similar-card .sm .t{font-size:.7rem;font-weight:600;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* Right: episode sidebar */
.detail-right{width:340px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ep-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.ep-header .t{font-size:.9rem;font-weight:800}
.ep-header .s{font-size:.72rem;color:var(--muted);margin-top:2px}
.ep-search{padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.ep-search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--text);font-size:.78rem;outline:none}
.ep-search input:focus{border-color:var(--accent)}
.ep-list{flex:1;overflow-y:auto;padding:8px}
.ep-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:.78rem;text-align:left;transition:all .2s;margin-bottom:5px}
.ep-btn:hover{border-color:rgba(230,57,70,.4);background:rgba(230,57,70,.06);transform:translateX(2px)}
.ep-btn.active{border-color:var(--accent);background:rgba(230,57,70,.12);box-shadow:0 0 0 1px var(--accent)}
.ep-btn .num{color:var(--accent);font-weight:800;font-size:.72rem;min-width:22px}
.ep-btn .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Back button */
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:0}
.back-btn:hover{color:var(--text);background:rgba(255,255,255,.08);border-color:var(--accent)}

/* Footer */
.footer{text-align:center;padding:40px 0 20px;color:var(--muted);font-size:.68rem;border-top:1px solid var(--border);margin-top:20px}

/* ========== RESPONSIVE ========== */
@media(max-width:860px){
  .detail-wrap{flex-direction:column}
  .detail-right{width:100%;height:50vh;border-left:none;border-top:1px solid var(--border)}
  .hero-bg{height:340px}
  .hero-poster{width:110px;height:155px}
  .hero-title{font-size:1.3rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}
  .similar-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .nav .links{display:none}
}
@media(max-width:480px){
  .hero-inner{padding:0 14px 24px}
  .hero-poster{width:90px;height:128px}
  .container{padding:0 14px}
}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav" id="nav">
  <span class="logo" onclick="goHome()">紊流番剧</span>
  <div class="links">
    <span class="link on" data-page="home" onclick="goHome()">首页</span>
  </div>
  <div class="search">
    <input id="searchInput" placeholder="搜索番剧..." onkeydown="if(event.key==='Enter')doSearch()">
    <span class="ic">🔍</span>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="homePage">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-inner" id="heroInner">
      <div class="loading"><span class="spin"></span> 加载中...</div>
    </div>
  </div>
  <div class="container">
    <div class="sec-head">
      <div class="sec-title" id="gridTitle">📺 热门番剧</div>
      <div class="sec-count" id="gridCount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="footer">紊流番剧 · 数据来自 AGE动漫 · 仅供学习交流</div>
</div>

<!-- ===== DETAIL PAGE ===== -->
<div class="page" id="detailPage">
  <div class="detail-wrap">
    <!-- Left -->
    <div class="detail-left">
      <div class="player-container">
        <div class="ratio">
          <div class="player-placeholder" id="playerPlaceholder">
            <div class="big-icon">▶</div>
            <p>请从右侧选择一集开始播放</p>
          </div>
          <iframe id="vidFrame" style="display:none" allowfullscreen></iframe>
        </div>
      </div>
      <div class="player-info" id="playerInfo">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <button class="back-btn" onclick="goHome()">← 返回首页</button>
        </div>
        <div class="title" id="dTitle">-</div>
        <div class="sub" id="dSub">-</div>
        <div class="tags" id="dTags"></div>
      </div>
      <div class="detail-desc">
        <h4>📖 简介</h4>
        <p id="dDesc">-</p>
      </div>
      <div class="detail-similar">
        <h4>💡 相似推荐</h4>
        <div class="similar-grid" id="similarGrid"></div>
      </div>
    </div>
    <!-- Right: episodes -->
    <div class="detail-right">
      <div class="ep-header">
        <div class="t" id="epTitle">选集播放</div>
        <div class="s" id="epCount">-</div>
      </div>
      <div class="ep-search">
        <input id="epFilter" placeholder="搜索集数..." oninput="filterEps()">
      </div>
      <div class="ep-list" id="epList"></div>
    </div>
  </div>
</div>

<script>
const API='';
let ALL=[], CUR_EPS=[], CUR_AID='', CUR_PLAYING='';

// Nav scroll
addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled',scrollY>40);
});

// ===== HOME =====
addEventListener('DOMContentLoaded',async()=>{
  const r=await fetch(API+'/api/search?limit=200');
  const j=await r.json();
  ALL=j.data||[];
  if(ALL.length>0) renderHero(ALL[0]);
  renderGrid(ALL);
});

function renderHero(a){
  if(!a)return;
  fetch(API+'/api/detail/'+a.id).then(r=>r.json()).then(j=>{
    if(!j.ok)return;
    const d=j.data;
    document.getElementById('heroInner').innerHTML=`
      <div class="hero-poster"><img src="${d.cover}" onerror="this.parentElement.style.display='none'"></div>
      <div class="hero-info">
        <span class="hero-badge">${d.status||'连载'}</span>
        <div class="hero-title">${d.title||''}</div>
        <div class="hero-meta">${(d.episodes||[]).length} 集 · ${(d.tags||[]).slice(0,3).join(' / ')}</div>
        <p class="hero-desc">${d.desc||''}</p>
        <div class="hero-btns">
          <button class="btn btn-accent" onclick="openDetail('${a.id}')">▶ 立即观看</button>
          <button class="btn btn-ghost" onclick="openDetail('${a.id}')">详情</button>
        </div>
      </div>`;
  }).catch(()=>{});
}

function renderGrid(list){
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty">暂无数据</div>';return;}
  g.innerHTML=list.map(a=>`
    <div class="card" onclick="openDetail('${a.id}')">
      <div class="thumb">
        <img src="${a.cover}" loading="lazy" onerror="this.style.display='none'">
        <div class="grad"></div>
        <div class="play-btn"></div>
        ${a.episodes?`<span class="ep-tag">${a.episodes}集</span>`:''}
      </div>
      <div class="meta">
        <div class="t">${a.title||'加载中...'}</div>
        <div class="s">${(a.tags||[]).slice(0,2).join(' · ')||a.status||''}</div>
      </div>
    </div>`).join('');
  document.getElementById('gridCount').textContent=list.length+' 部';
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){renderGrid(ALL);document.getElementById('gridTitle').textContent='📺 热门番剧';return;}
  document.getElementById('grid').innerHTML='<div class="loading"><span class="spin"></span> 搜索中...</div>';
  document.getElementById('gridTitle').textContent=`🔍 "${q}"`;
  fetch(API+'/api/search?q='+encodeURIComponent(q)+'&limit=200').then(r=>r.json()).then(j=>{
    renderGrid(j.data||[]);
    if(!j.data||!j.data.length) document.getElementById('grid').innerHTML='<div class="empty">未找到相关番剧</div>';
  });
}

function goHome(){
  document.getElementById('searchInput').value='';
  document.getElementById('homePage').classList.add('active');
  document.getElementById('detailPage').classList.remove('active');
  document.getElementById('nav').querySelector('.link').classList.add('on');
  document.getElementById('vidFrame').style.display='none';
  document.getElementById('vidFrame').src='';
  document.getElementById('playerPlaceholder').style.display='flex';
  renderGrid(ALL);
  document.getElementById('gridTitle').textContent='📺 热门番剧';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== DETAIL =====
async function openDetail(id){
  CUR_AID=id;
  CUR_PLAYING='';
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');
  document.getElementById('nav').querySelector('.link').classList.remove('on');
  document.getElementById('vidFrame').style.display='none';
  document.getElementById('vidFrame').src='';
  document.getElementById('playerPlaceholder').style.display='flex';
  window.scrollTo({top:0});

  // Reset
  document.getElementById('dTitle').textContent='加载中...';
  document.getElementById('dSub').textContent='';
  document.getElementById('dTags').innerHTML='';
  document.getElementById('dDesc').textContent='加载中...';
  document.getElementById('epList').innerHTML='<div class="loading"><span class="spin"></span></div>';
  document.getElementById('similarGrid').innerHTML='';

  const r=await fetch(API+'/api/detail/'+id);
  const j=await r.json();
  if(!j.ok){goHome();return;}
  const d=j.data;

  document.getElementById('dTitle').textContent=d.title||'未知';
  document.getElementById('dSub').textContent=`${d.status||''} · ${(d.episodes||[]).length}集`;
  document.getElementById('dTags').innerHTML=(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('dDesc').textContent=d.desc||'暂无简介';
  document.getElementById('epTitle').textContent=d.title||'选集播放';
  document.getElementById('epCount').textContent=`共${(d.episodes||[]).length}集`;

  // Episodes
  CUR_EPS=d.episodes||[];
  renderEpList(CUR_EPS);

  // Similar
  const sr=await fetch(API+'/api/recommend?aid='+id+'&limit=8');
  const sj=await sr.json();
  if(sj.ok){
    document.getElementById('similarGrid').innerHTML=(sj.data||[]).map(a=>`
      <div class="similar-card" onclick="openDetail('${a.id}')">
        <div class="st"><img src="${a.cover}" loading="lazy" onerror="this.style.display='none'"></div>
        <div class="sm"><div class="t">${a.title||''}</div></div>
      </div>`).join('');
  }
}

function renderEpList(eps){
  const el=document.getElementById('epList');
  el.innerHTML=eps.map(ep=>`
    <button class="ep-btn${CUR_PLAYING===ep.id?' active':''}" onclick="playEp('${ep.id}','${ep.t}')">
      <span class="num">${ep.i}</span>
      <span class="name">${ep.t}</span>
    </button>`).join('');
}

function filterEps(){
  const q=document.getElementById('epFilter').value.trim();
  if(!q){renderEpList(CUR_EPS);return;}
  const filtered=CUR_EPS.filter(ep=>ep.t.includes(q)||String(ep.i).includes(q));
  renderEpList(filtered);
}

async function playEp(epId,title){
  CUR_PLAYING=epId;
  renderEpList(CUR_EPS);
  document.getElementById('playerPlaceholder').style.display='none';
  document.getElementById('vidFrame').style.display='block';
  document.getElementById('vidFrame').src='';
  document.getElementById('dSub').textContent=`正在播放：${title}`;

  const r=await fetch(API+'/api/play?ep='+encodeURIComponent(epId));
  const j=await r.json();
  if(!j.ok){
    document.getElementById('playerPlaceholder').style.display='flex';
    document.getElementById('playerPlaceholder').querySelector('p').textContent='获取播放地址失败';
    document.getElementById('vidFrame').style.display='none';
    return;
  }
  document.getElementById('vidFrame').src=j.data.iframe;

  // Scroll ep into view
  const activeBtn=document.querySelector('.ep-btn.active');
  if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ESC
addEventListener('keydown',e=>{
  if(e.key==='Escape') goHome();
});
</script>
</body>
</html>
